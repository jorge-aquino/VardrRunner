name: Release

# Tag-driven release: push a `vX.Y.Z` tag to build, attest, and publish.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # PyPI trusted publishing + provenance attestation
  attestations: write # build-provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Generate SBOM (CycloneDX)
        # Non-blocking: an SBOM-tooling hiccup must never hold up a release.
        continue-on-error: true
        run: |
          pip install cyclonedx-bom
          pip install -e .
          cyclonedx-py environment --output-format JSON > sbom.cdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            sbom.cdx.json
          generate_release_notes: true

      # Opt-in: set repo variable PYPI_PUBLISH=true and configure a PyPI trusted
      # publisher for this workflow. Until then the build/SBOM/Release still run.
      - name: Publish to PyPI
        if: ${{ vars.PYPI_PUBLISH == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
