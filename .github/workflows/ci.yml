name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check vardrrunner tests

      - name: Format check (ruff)
        run: ruff format --check vardrrunner tests

      - name: Type check (mypy)
        run: mypy vardrrunner

      - name: Run tests + coverage
        run: pytest tests --cov=vardrrunner --cov-report=term-missing --cov-fail-under=60
