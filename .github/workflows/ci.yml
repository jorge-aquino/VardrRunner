name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check vardrrunner tests
      - name: Format check (ruff)
        run: ruff format --check vardrrunner tests
      - name: Type check (mypy)
        run: mypy vardrrunner
      - name: Security scan (bandit)
        run: bandit -r vardrrunner -ll -q

  test:
    name: Tests (${{ matrix.os }} / py${{ matrix.python }})
    needs: lint
    strategy:
      fail-fast: false
      # The daemon is OS-sensitive (Windows ctypes liveness, POSIX signals), so we
      # run the full matrix on Linux and smoke the other OSes on the prod runtime.
      matrix:
        include:
          - { os: ubuntu-latest, python: "3.10" }
          - { os: ubuntu-latest, python: "3.11" }
          - { os: ubuntu-latest, python: "3.12" }
          - { os: windows-latest, python: "3.12" }
          - { os: macos-latest, python: "3.12" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests + coverage
        run: pytest tests --cov=vardrrunner --cov-report=term-missing --cov-fail-under=95

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Audit dependencies (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -e .
          pip-audit
